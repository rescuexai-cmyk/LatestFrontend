name: ride_hailing_flutter
description: A ride-hailing mobile app migrated from React Native to Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Firebase (compatible versions)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6
  firebase_analytics: ^11.3.6
  firebase_storage: ^12.3.7
  cloud_firestore: ^5.5.2
  firebase_app_check: ^0.3.1
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.1
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  flutter_polyline_points: ^2.0.0
  
  # Network & API
  dio: ^5.4.0
  socket_io_client: ^3.0.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.6
  share_plus: ^7.2.1
  
  # Forms & Validation
  flutter_form_builder: ^10.1.0
  form_builder_validators: ^11.0.0
  
  # Utilities
  image: ^4.1.3
  uuid: ^4.2.2
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  intl: ^0.20.2
  http: ^1.2.0
  
  # Payment (Razorpay)
  razorpay_flutter: ^1.3.6
  
  # Icons
  cupertino_icons: ^1.0.6
  ionicons: ^0.2.2
  google_fonts: ^6.2.1
  
  # Haptic Feedback
  vibration: ^2.0.1
  
  # Image Picker
  image_picker: ^1.0.7
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Local Notifications (for foreground FCM display)
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  fluttertoast: ^8.2.10
  web: ^1.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/map_icons/
    - assets/vehicles/
    - assets/map_styles/

